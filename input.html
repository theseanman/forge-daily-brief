<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>FORGE OS · Data Input</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #d84315 0%, #ff9800 50%, #ffc107 100%);
      font-family: -apple-system, sans-serif;
      min-height: 100vh;
      padding: 20px;
      color: #0d0d0d;
    }
    .shell { max-width: 500px; margin: 0 auto; }
    h1 { font-size: 22px; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 6px; }
    .sub { font-size: 14px; color: #4a4a4a; margin-bottom: 24px; }
    .card {
      background: rgba(255,255,255,0.2);
      border: 3px solid #0d0d0d;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .card h2 { font-size: 14px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; margin-bottom: 14px; }
    .field { margin-bottom: 14px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #1a1a1a; }
    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #0d0d0d;
      border-radius: 8px;
      background: rgba(255,255,255,0.4);
      color: #0d0d0d;
      -webkit-appearance: none;
    }
    input:focus { outline: none; background: rgba(255,255,255,0.6); }
    .btn {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.1em;
      background: #0d0d0d;
      color: #ffc107;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 8px;
      touch-action: manipulation;
    }
    .btn:active { opacity: 0.8; }
    .btn-secondary {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      font-weight: 700;
      background: rgba(255,255,255,0.3);
      color: #0d0d0d;
      border: 2px solid #0d0d0d;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 8px;
      touch-action: manipulation;
    }
    #status {
      margin-top: 16px;
      padding: 14px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      display: none;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 15px;
      font-weight: 700;
      color: #0d0d0d;
      text-decoration: none;
      border-bottom: 2px solid #0d0d0d;
    }
    #setup-section { display: none; }
  </style>
</head>
<body>
<div class="shell">

  <h1>🌴 FORGE OS</h1>
  <div class="sub">Enter today's HRV + Sleep data</div>

  <!-- SETUP SECTION (shown only first time) -->
  <div id="setup-section" class="card">
    <h2>🔑 First Time Setup</h2>
    <div class="field">
      <label>Paste your GitHub PAT here (one time only)</label>
      <input type="text" id="pat-input" placeholder="ghp_...">
    </div>
    <button class="btn" onclick="savePAT()">Save PAT</button>
  </div>

  <!-- MAIN FORM -->
  <div id="main-form">
    <div class="card">
      <h2>❤️ Welltory HRV</h2>
      <div class="field">
        <label>Stress % (0-100)</label>
        <input type="number" id="stress" min="0" max="100" placeholder="e.g. 72">
      </div>
      <div class="field">
        <label>Energy % (0-100)</label>
        <input type="number" id="energy" min="0" max="100" placeholder="e.g. 39">
      </div>
      <div class="field">
        <label>Health % (0-100)</label>
        <input type="number" id="health" min="0" max="100" placeholder="e.g. 20">
      </div>
    </div>

    <div class="card">
      <h2>😴 Sleep Data</h2>
      <div class="field">
        <label>Sleep Score % (0-100)</label>
        <input type="number" id="sleep_score" min="0" max="100" placeholder="e.g. 94">
      </div>
      <div class="field">
        <label>Sleep Duration</label>
        <input type="text" id="sleep_duration" placeholder="e.g. 7h 15m">
      </div>
      <div class="field">
        <label>HR Range Min (bpm)</label>
        <input type="number" id="hr_min" min="30" max="120" placeholder="e.g. 52">
      </div>
      <div class="field">
        <label>HR Range Max (bpm)</label>
        <input type="number" id="hr_max" min="30" max="120" placeholder="e.g. 72">
      </div>
    </div>

    <button class="btn" onclick="submitData()">🚀 UPDATE BRIEF</button>
    <button class="btn-secondary" onclick="resetPAT()">Reset PAT (if not working)</button>
  </div>

  <div id="status"></div>
  <a href="https://theseanman.github.io/forge-daily-brief" class="back-link">← Back to Brief</a>

</div>
<script>
var GITHUB_REPO = "theseanman/forge-daily-brief";
var GITHUB_BRANCH = "gh-pages";

function showStatus(msg, color) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.background = color === 'green' ? 'rgba(39,174,96,0.3)' : color === 'red' ? 'rgba(192,57,43,0.3)' : 'rgba(255,255,255,0.3)';
  el.style.border = '2px solid ' + (color === 'green' ? '#27ae60' : color === 'red' ? '#c0392b' : '#0d0d0d');
}

function checkSetup() {
  var token = localStorage.getItem('forge_pat');
  if (!token) {
    document.getElementById('setup-section').style.display = 'block';
    document.getElementById('main-form').style.display = 'none';
  } else {
    document.getElementById('setup-section').style.display = 'none';
    document.getElementById('main-form').style.display = 'block';
  }
}

function savePAT() {
  var pat = document.getElementById('pat-input').value.trim();
  if (!pat || pat.length < 10) {
    showStatus('Please enter a valid PAT', 'red');
    return;
  }
  localStorage.setItem('forge_pat', pat);
  showStatus('PAT saved!', 'green');
  setTimeout(function() { checkSetup(); }, 1000);
}

function resetPAT() {
  localStorage.removeItem('forge_pat');
  checkSetup();
}

function submitData() {
  var token = localStorage.getItem('forge_pat');
  if (!token) {
    showStatus('No PAT found. Please set up first.', 'red');
    checkSetup();
    return;
  }

  var stress = document.getElementById('stress').value;
  var energy = document.getElementById('energy').value;
  var health = document.getElementById('health').value;
  var score = document.getElementById('sleep_score').value;
  var duration = document.getElementById('sleep_duration').value;
  var hr_min = document.getElementById('hr_min').value;
  var hr_max = document.getElementById('hr_max').value;

  if (!stress || !energy || !health || !score || !duration || !hr_min || !hr_max) {
    showStatus('Please fill in all fields', 'red');
    return;
  }

  showStatus('Saving...', 'white');

  var data = {
    welltory: { stress: parseInt(stress), energy: parseInt(energy), health: parseInt(health) },
    sleep: { score: parseInt(score), duration: duration, hr_range: hr_min + '-' + hr_max },
    updated: new Date().toISOString()
  };

  var jsonStr = JSON.stringify(data, null, 2);
  var content = btoa(unescape(encodeURIComponent(jsonStr)));

  var xhr1 = new XMLHttpRequest();
  xhr1.open('GET', 'https://api.github.com/repos/' + GITHUB_REPO + '/contents/data.json?ref=' + GITHUB_BRANCH, true);
  xhr1.setRequestHeader('Authorization', 'token ' + token);

  xhr1.onreadystatechange = function() {
    if (xhr1.readyState !== 4) return;

    var sha = null;
    if (xhr1.status === 200) {
      try { sha = JSON.parse(xhr1.responseText).sha; } catch(e) {}
    }

    var body = { message: 'FORGE data update', content: content, branch: GITHUB_BRANCH };
    if (sha) body.sha = sha;

    var xhr2 = new XMLHttpRequest();
    xhr2.open('PUT', 'https://api.github.com/repos/' + GITHUB_REPO + '/contents/data.json', true);
    xhr2.setRequestHeader('Authorization', 'token ' + token);
    xhr2.setRequestHeader('Content-Type', 'application/json');

    xhr2.onreadystatechange = function() {
      if (xhr2.readyState !== 4) return;
      if (xhr2.status === 200 || xhr2.status === 201) {
        showStatus('Saved! Returning...', 'green'); setTimeout(function(){ window.location='https://theseanman.github.io/forge-daily-brief'; }, 2000);
      } else if (xhr2.status === 401) {
        showStatus('PAT invalid or expired. Tap Reset PAT.', 'red');
      } else {
        if(xhr2.status===409){setTimeout(submitData,500);}else{showStatus('Error ' + xhr2.status + '. Try Reset PAT.', 'red');}
      }
    };

    xhr2.send(JSON.stringify(body));
  };

  xhr1.send();
}

window.onload = function() { checkSetup(); };
</script>
</body>
</html>
